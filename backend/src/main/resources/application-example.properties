server.port=8081

# --- DATABASE CONNECTION ---
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/hanzii?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HIBERNATE SETTINGS ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- DICTIONARY IMPORT ---
dictionary.import.enabled=${DICTIONARY_IMPORT_ENABLED:true}
dictionary.import.file-path=${DICTIONARY_IMPORT_FILE_PATH:}

# --- OPENAPI / SWAGGER UI ---
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- JWT SETTINGS ---
jwt.secret=${JWT_SECRET:LocalDevOnlyJwtSecretKey_ChangeMe_32CharsMin}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- AI PROVIDER SWITCH (gemini | openai) ---
ai.provider=${AI_PROVIDER:gemini}

# --- GEMINI AI SETTINGS ---
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}

# --- OPENAI AI SETTINGS ---
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
